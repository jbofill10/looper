syntax = "proto3";

package looper.v1;

option go_package = "github.com/jbofill10/looper/rpc;rpc";

// Looper is the daemon control service spoken over the local Unix socket.
service Looper {
  // Ping checks liveness and returns the daemon version.
  rpc Ping(PingRequest) returns (PingResponse);
  // Shutdown asks the daemon to stop gracefully.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // StartLoop starts running a loop in the daemon and returns its run id.
  rpc StartLoop(StartLoopRequest) returns (StartLoopResponse);
  // StopLoop stops a running loop.
  rpc StopLoop(StopLoopRequest) returns (StopLoopResponse);
  // ListRuns returns the current runs known to the daemon.
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  // StreamState streams state updates for a run (or all runs if run_id empty).
  rpc StreamState(StreamStateRequest) returns (stream StateUpdate);
  // RespondDecision answers a pending decision request (manual step, failure).
  rpc RespondDecision(RespondDecisionRequest) returns (RespondDecisionResponse);

  // ListLoops lists every loop configured under base_dir, with its
  // enabled/running state.
  rpc ListLoops(ListLoopsRequest) returns (ListLoopsResponse);
  // SetLoopEnabled persists a loop's enabled flag and starts/gracefully
  // stops its run accordingly.
  rpc SetLoopEnabled(SetLoopEnabledRequest) returns (SetLoopEnabledResponse);
  // RunLoopOnce starts a loop as a one-off run (max_iterations forced to 1).
  rpc RunLoopOnce(RunLoopOnceRequest) returns (RunLoopOnceResponse);
  // StopLoopGraceful lets a run's in-flight iteration finish, then stops it
  // before the next iteration (unlike StopLoop, does not cancel mid-step).
  rpc StopLoopGraceful(StopLoopGracefulRequest) returns (StopLoopGracefulResponse);
  // RenameLoop renames a loop's file and registry entry.
  rpc RenameLoop(RenameLoopRequest) returns (RenameLoopResponse);
  // DeleteLoop deletes a loop's file and registry entry.
  rpc DeleteLoop(DeleteLoopRequest) returns (DeleteLoopResponse);
  // SetScheduleEnabled persists a loop's schedule-enabled flag,
  // independent of its continuous enabled flag. It does not itself
  // start/stop any run.
  rpc SetScheduleEnabled(SetScheduleEnabledRequest) returns (SetScheduleEnabledResponse);

  // Attach opens a bidirectional stream to a run's live interactive session:
  // the client sends stdin bytes and resize events; the server streams the
  // session's terminal output.
  rpc Attach(stream AttachInput) returns (stream AttachOutput);
}

message AttachInput {
  oneof msg {
    AttachStart start = 1; // MUST be the first message
    bytes data = 2;        // stdin bytes
    Resize resize = 3;     // terminal resize
  }
}
message AttachStart { string run_id = 1; }
message Resize {
  uint32 rows = 1;
  uint32 cols = 2;
}
message AttachOutput { bytes data = 1; }

message PingRequest {}
message PingResponse { string version = 1; }

message ShutdownRequest {}
message ShutdownResponse {}

message StartLoopRequest {
  string loop_name = 1; // resolved under base_dir/loops/<name>.yaml if loop_file empty
  string loop_file = 2; // explicit loop file (overrides loop_name)
  string base_dir = 3;  // the .looper dir
  string workdir = 4;   // execution dir
  int32 concurrency = 5; // number of workers; 0 = the loop's configured concurrency
}
message StartLoopResponse { string run_id = 1; }

message StopLoopRequest { string run_id = 1; }
message StopLoopResponse {}

message ListRunsRequest {}
message WorkerInfo {
  string worker_id = 1;
  string task = 2;          // the worker's current work unit (task var)
  int32 iteration = 3;
  string current_step = 4;
  string state = 5;
  string status = 6;        // running | idle | done | stopped | error
}
message RunInfo {
  string run_id = 1;
  string loop_name = 2;
  string status = 3;       // running | done | stopped | error
  int32 iteration = 4;
  string current_step = 5;
  string state = 6;
  string error = 7;
  repeated WorkerInfo workers = 8;
}
message ListRunsResponse { repeated RunInfo runs = 1; }

message StreamStateRequest { string run_id = 1; } // empty = all runs

// StateUpdate is one event on a run's state stream.
message StateUpdate {
  string run_id = 1;
  string kind = 2;        // step_start | state | decision_request | run_done | log
  string loop_name = 3;
  int32 iteration = 4;
  string step = 5;
  string state = 6;
  string message = 7;
  string request_id = 8;      // set when kind == decision_request
  repeated string options = 9; // e.g. ["advance","retry","abort"]
  string worker_id = 10;       // which worker this update is about
  string task = 11;            // the worker's current work unit
}

message RespondDecisionRequest {
  string run_id = 1;
  string request_id = 2;
  string outcome = 3; // advance | retry | abort
}
message RespondDecisionResponse {}

message ListLoopsRequest { string base_dir = 1; }
message LoopInfo {
  string name = 1;
  string path = 2;
  bool enabled = 3;
  repeated string steps = 4;
  string run_id = 5; // active run id, empty if not running
  bool schedule_enabled = 6;
  string next_run = 7; // RFC3339, empty if unscheduled or schedule disabled
}
message ListLoopsResponse { repeated LoopInfo loops = 1; }

message SetLoopEnabledRequest {
  string loop_name = 1;
  string base_dir = 2;
  string workdir = 3;
  bool enabled = 4;
}
message SetLoopEnabledResponse { string run_id = 1; } // empty if disabling an already-stopped loop

message RunLoopOnceRequest {
  string loop_name = 1;
  string loop_file = 2;
  string base_dir = 3;
  string workdir = 4;
}
message RunLoopOnceResponse { string run_id = 1; }

message StopLoopGracefulRequest { string run_id = 1; }
message StopLoopGracefulResponse {}

message RenameLoopRequest {
  string loop_name = 1;
  string new_name = 2;
  string base_dir = 3;
}
message RenameLoopResponse {}

message DeleteLoopRequest {
  string loop_name = 1;
  string base_dir = 2;
}
message DeleteLoopResponse {}

message SetScheduleEnabledRequest {
  string loop_name = 1;
  string base_dir = 2;
  string workdir = 3;
  bool enabled = 4;
}
message SetScheduleEnabledResponse {}
