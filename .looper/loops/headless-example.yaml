name: headless-example
max_iterations: 1
steps:
  - name: get-task
    type: script
    run: "echo TASK_ID=1 >> \"$LOOPER_OUTPUT\""
    outputs: [TASK_ID]
  # This step requires the `claude` CLI to be installed and on PATH, and runs
  # it headlessly (`claude -p <prompt>`) using the default "claude" harness
  # from ~/.config/looper/config.yaml (or the built-in default if unset).
  - name: work-on-task
    type: headless
    prompt: "Work on task {{TASK_ID}}. When finished, output {{SENTINEL_DONE}}."
  - name: confirm
    type: manual
